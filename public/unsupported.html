<!doctype html>
<!--
  Shown to browsers below the app's floor (Safari 16.4 / Chrome 111 / Firefox
  128), which the pre-paint gate in the root layout redirects here. Deliberately
  uses only old-browser-safe CSS — no color-mix / @property / oklch, and no
  flexbox `gap` (iOS 13/14 ignore it; margins are used instead) — since its
  entire audience is exactly those older browsers.
-->
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>ناخدا — مرورگر پشتیبانی‌نشده</title>
    <style>
      @font-face {
        font-family: "IRANYekanX";
        src: url("/fonts/iran-yekan/woff2/IRANYekanXVF.woff2") format("woff2");
        font-weight: 100 900;
        font-display: swap;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: "IRANYekanX", Tahoma, system-ui, sans-serif;
        background: #ffffff;
        color: #1a1b1e;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 440px;
        min-height: 100%;
        margin: 0 auto;
        padding: 32px 24px;
        text-align: center;
        display: -webkit-box;
        display: -webkit-flex;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-flex-direction: column;
        flex-direction: column;
        -webkit-box-pack: center;
        -webkit-justify-content: center;
        justify-content: center;
        -webkit-box-align: center;
        -webkit-align-items: center;
        align-items: center;
      }
      /* No flexbox `gap` — old Safari (iOS 13/14) ignores it, so spacing is on
         margins. */
      .logo {
        display: block;
        width: auto;
        height: 56px;
        margin: 0 0 24px;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        line-height: 1.4;
        margin: 0 0 12px;
      }
      p {
        font-size: 16px;
        line-height: 1.9;
        color: #696969;
        margin: 0 0 22px;
      }
      .brandword {
        color: #2979ff;
        font-weight: 800;
      }
      ul {
        list-style: none;
        width: 100%;
        padding: 0;
        margin: 0;
      }
      li {
        background: #f8f9fa;
        border: 1px solid #f1f3f5;
        border-radius: 12px;
        padding: 12px 16px;
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="/logo.svg" alt="ناخدا" />
      <h1>مرورگر شما پشتیبانی نمی‌شود</h1>
      <p>
        برای استفاده از <span class="brandword">ناخدا</span> به یک مرورگر جدیدتر
        نیاز دارید. لطفاً مرورگر خود را به‌روزرسانی کنید یا از یکی از این
        مرورگرها استفاده کنید:
      </p>
      <ul>
        <li>گوگل کروم ۱۱۱ یا جدیدتر</li>
        <li>سافاری روی iOS ۱۶٫۴ یا جدیدتر</li>
        <li>موزیلا فایرفاکس ۱۲۸ یا جدیدتر</li>
      </ul>
    </div>
  </body>
</html>
