<!doctype html>
<!--
  Standalone maintenance screen — served by the static/edge layer when the app
  itself is down, so it depends on NOTHING from the Next build: no framework,
  no compiled tokens, no next/font. Everything is inlined; the only external
  reference is the self-hosted font (absolute /fonts path), with a Persian
  system fallback if even that can't load. Tokens mirror app/globals.css.
  Wire-up: point the CDN/edge fallback (or a Vercel rewrite) at /maintenance.html.
-->
<html lang="fa" dir="rtl" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <!-- Recovery sentinel: the poller below treats the app as "back" only once
         the root URL stops returning a page carrying this marker. -->
    <meta name="nakhoda-status" content="maintenance" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0f1115"
      media="(prefers-color-scheme: dark)"
    />
    <title>ناخدا — در حال به‌روزرسانی</title>
    <style>
      @font-face {
        font-family: "IRANYekanX";
        src: url("/fonts/iran-yekan/woff2/IRANYekanXVF.woff2") format("woff2");
        font-weight: 100 900;
        font-display: swap;
      }

      :root {
        --brand: #2979ff;
        --paper: #ffffff;
        --ink: #1a1b1e;
        --muted: #696969;
        --surface: #f8f9fa;
        --line: #f1f3f5;
        --wave: rgba(41, 137, 255, 0.06);
      }
      /* Class-based like the app (the inline script below reads the app's own
         stored theme), so the page follows the USER's choice, not just the OS.
         Default is dark — mirrors app/globals.css. */
      :root.dark {
        --brand: #4d8bff;
        --paper: #000;
        --ink: #f3f4f6;
        --muted: #9ca3af;
        --surface: #010101;
        --line: #111;
        --wave: rgba(77, 139, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          "IRANYekanX",
          Tahoma,
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--paper);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow: hidden;
      }

      /* Ambient sea: two slow wave bands anchored to the foot of the page. */
      .waves {
        position: fixed;
        inset: auto 0 0 0;
        height: 42vh;
        max-height: 360px;
        pointer-events: none;
        z-index: 0;
        color: var(--wave);
      }
      .waves svg {
        width: 100%;
        height: 100%;
      }

      main {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand .word {
        font-weight: 800;
        font-size: 30px;
        line-height: 1;
        color: var(--brand);
      }
      .mark {
        height: 52px;
        width: auto;
        animation: bob 4s ease-in-out infinite;
      }
      /* Same mark as the app's Logo, driven by the theme tokens: the shield
         flips with the theme, the anchor stays brand. */
      #shield {
        fill: var(--ink);
      }
      #anchor {
        fill: var(--brand);
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      h1 {
        margin: 8px 0 0;
        font-size: 26px;
        font-weight: 800;
        line-height: 1.35;
        text-wrap: balance;
      }
      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.95;
        color: var(--muted);
        max-width: 40ch;
      }

      .safe {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line);
        font-size: 13.5px;
        font-weight: 700;
        color: var(--ink);
      }
      .safe svg {
        color: var(--brand);
        flex-shrink: 0;
      }

      button {
        font: inherit;
        font-weight: 800;
        font-size: 15px;
        color: #fff;
        background: var(--brand);
        border: 0;
        border-radius: 14px;
        padding: 14px 32px;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      button:hover {
        opacity: 0.92;
      }
      button:focus-visible {
        outline: 2px solid var(--brand);
        outline-offset: 3px;
      }

      .poll {
        font-size: 12.5px;
        color: var(--muted);
        opacity: 0.75;
        margin-top: -4px;
      }

      @media (prefers-reduced-motion: reduce) {
        .mark {
          animation: none;
        }
      }
    </style>
  </head>

    <script>
      // Match the app's theme: read its stored preference and default to dark,
      // exactly like the app's pre-paint script (localStorage key "theme").
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var d =
            t === "light"
              ? false
              : t === "system"
                ? matchMedia("(prefers-color-scheme: dark)").matches
                : true;
          document.documentElement.classList.toggle("dark", d);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

      <h1>ناخدا موقتاً لنگر انداخته</h1>
      <p>
        در حال به‌روزرسانی و بهبود سکو هستیم تا تجربه‌ی بهتری برایتان بسازیم.
        خیلی زود دوباره روی موج برمی‌گردیم.
      </p>

      <span class="safe">
        <svg
          width="16"
          height="16"
          viewBox="0 0 20 20"

          stroke="currentColor"
          stroke-width="1.6"

          />
          <path d="m7.5 10 1.667 1.667L12.5 8.333" />
        </svg>
        دارایی‌ها و حساب شما در امان است
      </span>

      <button type="button" onclick="location.reload()">تلاش دوباره</button>
      <p class="poll" id="poll" aria-live="polite">
        به‌طور خودکار بررسی می‌شود…
      </p>
    </main>

    <script>
      // Auto-recovery: quietly re-check the app root on an interval and reload
      // the moment it comes back. "Back" = the root responds AND no longer
      // carries the maintenance sentinel, so a rewrite that serves THIS page
      // for every route won't trigger a reload loop. Network errors (app fully
      // down) just mean "keep waiting". Pauses while the tab is hidden.
      (function () {
        var INTERVAL = 15000;
        var note = document.getElementById("poll");
        var checking = false;

        async function check() {
          if (checking || document.hidden) return;
          checking = true;
          try {
            var ctrl = new AbortController();
            var timer = setTimeout(function () {
              ctrl.abort();
            }, 8000);
            var res = await fetch("/?_probe=" + Date.now(), {
              cache: "no-store",
              signal: ctrl.signal,
              headers: { "x-maintenance-probe": "1" },
            });
            clearTimeout(timer);
            if (res.ok) {
              var body = await res.text();
              if (body.indexOf('name="nakhoda-status"') === -1) {
                note.textContent = "برگشتیم! در حال بارگذاری…";
                location.reload();
                return;
              }
            }
          } catch (e) {
            /* still down — wait for the next tick */
          } finally {
            checking = false;
          }
        }

        setInterval(check, INTERVAL);
        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) check();
        });
      })();
    </script>
